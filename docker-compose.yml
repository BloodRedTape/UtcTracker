services:
  utc:
    container_name: utc
    build: .
    restart: unless-stopped
    ports:
      - "7111:7111"
    environment:
      # GlitchTip error/log reporting. Leave unset to disable monitoring.
      - GLITCHTIP_DSN=${GLITCHTIP_DSN:-}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - SERVICE_NAME=${SERVICE_NAME:-nickutc}
    volumes:
      - ./run_tree:/data
    healthcheck:
      # python:slim has no curl/wget, so probe with Python's stdlib.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7111/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
